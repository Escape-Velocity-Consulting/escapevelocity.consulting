name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npx @11ty/eleventy

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy static files
        run: |
          gcloud compute ssh web-server \
            --zone=us-central1-a --tunnel-through-iap \
            --command="mkdir -p /tmp/escapevelocity-deploy"

          gcloud compute scp --recurse _site/* \
            web-server:/tmp/escapevelocity-deploy/ \
            --zone=us-central1-a --tunnel-through-iap

          gcloud compute ssh web-server \
            --zone=us-central1-a --tunnel-through-iap \
            --command="sudo rm -rf /mnt/pd/data/services/static/escapevelocity/* && sudo cp -r /tmp/escapevelocity-deploy/* /mnt/pd/data/services/static/escapevelocity/ && rm -rf /tmp/escapevelocity-deploy"
